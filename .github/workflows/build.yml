name: Build Zygisk Module

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Clone ShadowHook
        run: git clone --depth 1 https://github.com/bytedance/android-inline-hook.git external/shadowhook

      - name: Download cJSON
        run: |
          curl -sL https://raw.githubusercontent.com/DaveGamble/cJSON/v1.7.18/cJSON.c -o external/cJSON/cJSON.c
          curl -sL https://raw.githubusercontent.com/DaveGamble/cJSON/v1.7.18/cJSON.h -o external/cJSON/cJSON.h

      - name: Build ${{ matrix.abi }}
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -B build/${{ matrix.abi }} \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release .
          cmake --build build/${{ matrix.abi }} --config Release -j$(nproc)

      - name: Upload lib
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.abi }}
          path: build/${{ matrix.abi }}/${{ matrix.abi }}.so

  package:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: lib-arm64-v8a, path: zygisk/ }
      - uses: actions/download-artifact@v4
        with: { name: lib-armeabi-v7a, path: zygisk/ }

      - name: Package ZIP
        run: |
          mkdir -p output/zygisk output/webroot
          mv zygisk/arm64-v8a.so output/zygisk/
          mv zygisk/armeabi-v7a.so output/zygisk/
          cp module.prop customize.sh wipe.sh output/
          cp -r webroot/* output/webroot/
          cd output && zip -r ../zygisk-spoofer-release.zip .

      - uses: actions/upload-artifact@v4
        with: { name: zygisk-spoofer-module, path: zygisk-spoofer-release.zip }

      - name: Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Continuous Build' }}
          files: zygisk-spoofer-release.zip
          prerelease: ${{ github.ref_type != 'tag' }}
          generate_release_notes: true
